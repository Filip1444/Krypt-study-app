name: Build Study App

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ── Windows build ──────────────────────────────────────────────
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows release
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: |
            release/*.exe
            release/latest.yml
          if-no-files-found: error

  # ── macOS build ────────────────────────────────────────────────
  build-macos:
    name: Build (macOS)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build macOS release
        run: npm run dist:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: release_macOS/*.dmg
          if-no-files-found: error

  # ── GitHub Release (only on version tags like v1.0.0) ──────────
  release:
    name: Create GitHub Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: dist/windows

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-release
          path: dist/macos

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Study App ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            dist/windows/*.exe
            dist/macos/*.dmg
          body: |
            ## Study App ${{ github.ref_name }}

            ### Downloads
            | Platform | File |
            |----------|------|
            | 🪟 Windows Installer | `Study App Setup *.exe` |
            | 🪟 Windows Portable  | `Study App *.exe` (no install needed) |
            | 🍎 macOS             | `Study App *.dmg` |

            > **⚠️ macOS Users — "App is damaged" error fix:** 
            > 1. Open the `.dmg` and drag the app into your **Applications** folder
            > 2. Open the **Terminal** app on your Mac
            > 3. Paste this exact command and press Enter: `xattr -cr "/Applications/Study App.app"`
            > 4. You can now launch the app normally! (This bypasses Apple's strict Gatekeeper requirement for paid developer certificates).
